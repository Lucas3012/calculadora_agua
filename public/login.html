<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Lucas Omni 2026</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        .login-container {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: var(--dark);
        }
        .login-card {
            background: white;
            padding: 30px;
            border-radius: 15px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            text-align: center;
        }
        .login-card h2 { color: var(--dark); margin-bottom: 25px; }
        .tabs { display: flex; margin-bottom: 20px; gap: 10px; }
        .tab-btn {
            flex: 1;
            padding: 10px;
            border: none;
            background: #e2e8f0;
            cursor: pointer;
            border-radius: 5px;
            font-weight: bold;
        }
        .tab-btn.active { background: var(--primary); color: white; }
        #form-registro { display: none; }
    </style>
</head>
<body>

<div class="login-container">
    <div class="login-card">
        <h2>LUCAS OMNI</h2>
        
        <div class="tabs">
            <button class="tab-btn active" onclick="toggleTab('login')">Entrar</button>
            <button class="tab-btn" onclick="toggleTab('registro')">Criar Conta</button>
        </div>

        <div id="form-login">
            <input type="email" id="emailLogin" placeholder="Seu e-mail">
            <input type="password" id="senhaLogin" placeholder="Sua senha">
            <button class="btn-primary" onclick="fazerLogin()">Acessar Sistema</button>
        </div>

        <div id="form-registro">
            <input type="email" id="emailReg" placeholder="Novo e-mail">
            <input type="password" id="senhaReg" placeholder="Nova senha">
            <button class="btn-primary" onclick="fazerRegistro()" style="background: #10b981;">Cadastrar</button>
        </div>
    </div>
</div>

<script>
    function toggleTab(tab) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        if(tab === 'login') {
            document.getElementById('form-login').style.display = 'block';
            document.getElementById('form-registro').style.display = 'none';
            document.querySelectorAll('.tab-btn')[0].classList.add('active');
        } else {
            document.getElementById('form-login').style.display = 'none';
            document.getElementById('form-registro').style.display = 'block';
            document.querySelectorAll('.tab-btn')[1].classList.add('active');
        }
    }

    async function fazerLogin() {
        const email = document.getElementById('emailLogin').value;
        const senha = document.getElementById('senhaLogin').value;

        const res = await fetch('/api/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, senha })
        });

        const data = await res.json();
        if(res.ok) {
            localStorage.setItem('token', data.token);
            localStorage.setItem('idPublico', data.idPublico);
            window.location.href = 'index.html';
        } else {
            Swal.fire('Erro', data.error, 'error');
        }
    }

    async function fazerRegistro() {
        const email = document.getElementById('emailReg').value;
        const senha = document.getElementById('senhaReg').value;

        const res = await fetch('/api/registro', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, senha })
        });

        const data = await res.json();
        if(res.ok) {
            Swal.fire('Sucesso', 'ID Gerado: ' + data.idPublico, 'success');
            toggleTab('login');
        } else {
            Swal.fire('Erro', 'Falha no cadastro', 'error');
        }
    }
</script>

</body>
</html>
