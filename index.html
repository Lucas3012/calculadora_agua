<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lucas Omni - Gestão Hídrica</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <section id="tela-login" class="tela-sistema">
        <div class="container">
            <h1>🌊 Lucas Omni</h1>
            <p>Acesse seu painel de consumo</p>
            <div class="form-grupo">
                <input type="text" id="usuario" placeholder="Usuário">
                <input type="password" id="senha" placeholder="Senha">
                <button onclick="fazerLogin()">Entrar</button>
            </div>
        </div>
    </section>

    <nav id="menu-principal" class="menu-invisivel">
        <button id="nav-dashboard">Início</button>
        <button id="nav-historico">Histórico</button>
        <button id="nav-perfil">Perfil</button>
        <button id="nav-sair" class="btn-sair">Sair</button>
    </nav>

    <section id="tela-dashboard" class="tela-sistema">
        <div class="container">
            <h2>Lançar Consumo</h2>
            <p>Insira a leitura atual do hidrômetro:</p>
            <input type="number" id="valorLeitura" placeholder="Valor em m³">
            <button onclick="enviarLeitura()" class="btn-sucesso">Salvar Leitura</button>
        </div>
    </section>

    <section id="tela-historico" class="tela-sistema">
        <div class="container">
            <h2>Meu Histórico</h2>
            <div id="listaHistorico">
                <p>Nenhuma leitura encontrada.</p>
            </div>
        </div>
    </section>

    <section id="tela-perfil" class="tela-sistema">
        <div class="container">
            <h2>Meu Perfil</h2>
            <div class="card-perfil">
                <p><strong>Nome:</strong> Lucas Emanuel</p>
                <p><strong>Cargo:</strong> Gestor de TI / Automação</p>
                <p><strong>Status:</strong> Ativo</p>
            </div>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
